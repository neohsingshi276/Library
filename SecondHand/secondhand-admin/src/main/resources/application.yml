# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.9
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    # 最大请求大小（支持大文件上传，设置为500MB）
    max-swallow-size: 500MB
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.secondhand: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小（支持视频上传，设置为500MB）
      max-file-size: 500MB
      # 设置总上传的文件大小（支持视频上传，设置为500MB）
      max-request-size: 500MB
      # 启用文件上传
      enabled: true
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.secondhand.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Knife4j配置
knife4j:
  # 是否开启Knife4j
  enabled: true
  # 请求前缀（如果使用网关代理，设置前缀；直接访问设置为空）
  pathMapping:
  # Knife4j增强配置
  setting:
    # 是否启用Swagger Models（数据模型）
    enableSwaggerModels: true
    # 是否启用Authorize（授权功能，如果使用文档管理的全局参数设置，可以禁用）
    enableAuthorize: false

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 阿里云上传
aliyunoss:
  # 地域节点
  endpoint: oss-cn-hangzhou.aliyuncs.com
  # AccessKey
  accessKeyId: LTAI5tBwmnuNLHwkPNVEo4bR
  # AccessKey 秘钥
  accessKeySecret: BaPr7ZZ29m6tVoWgjn81LeRypdxHIX
  # bucket名称
  bucketName: mmq-qiyue
  # bucket下文件夹的路径
  filehost: img
  # 访问域名
  url: https://mmq-qiyue.oss-cn-hangzhou.aliyuncs.com

# ==================================
# LLM大语言模型配置
# ==================================
llm:
  # ========== API Key配置（关键！） ==========
  # 阿里云百炼API Key，用于所有LLM服务
  api-key: sk-78fa1c4d9feb4bdc9bbcd3952e0526f5

  # ========== 通用LLM服务配置 ==========
  # 多模态视觉模型（图片分析）- 重要配置！
  # 通义千问VL-增强版对应的模型名称
  vision-model: qwen-vl-plus
  # 通义千问API Base URL（文本生成）
  api-base-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  # 通义千问多模态API URL（图片分析）
  multimodal-api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
  # 服务类型
  service-type: qwen
  # 默认模型
  default-model: qwen-turbo
  # 最大token数
  max-tokens: 2000
  # 温度参数
  temperature: 0.7
  # 请求超时时间(秒)
  timeout: 60
  # 是否支持图像分析功能
  enable-image-analysis: true
  # 单次请求最多上传的图片数量
  max-images: 5
  # 单张图片的最大文件大小(MB)
  max-image-size: 10
  # 支持的图片格式
  supported-image-formats: jpg,jpeg,png,gif,bmp
